<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyseur de Texte - Sciences du Langage</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>Analyse des données dans un fichier</h1>
    </header>

    <main>
        <div class="container-principal">
            <div class="upload-section">
                <button class="btn-aide">Afficher l'aide</button>
                <div class="file-input-wrapper">
                    <label>Sélectionner un fichier au format .txt :</label>
                    <input type="file" id="monFichier" accept=".txt">
                </div>
            </div>

            <div class="settings-grid">
                <div class="field">
                    <span class="label-tag">DÉLIMITEUR(S)</span>
                    <input type="text" id="delims" value=" ,;.'!?-">
                </div>
                
                <div class="field-row">
                    <div class="field">
                        <span class="label-tag">PÔLE</span>
                        <input type="text" id="pole" placeholder="entrez un pôle...">
                    </div>
                    <div class="field">
                        <span class="label-tag">LONGUEUR</span>
                        <input type="number" id="longueur" value="10">
                    </div>
                </div>

                <div class="field full-width">
                    <span class="label-tag">MOTS GRAMMATICAUX (STOPWORDS)</span>
                    <textarea id="stopwords">de,le,la,les,à,et,des,un,une,du,que,en,l,que,qu,d,s,se,ne,n,ce,me,sa</textarea>
                </div>
            </div>

            <button class="btn-bonjour">Bonjour</button>

            <div class="toolbar">
                <button onclick="segmenter()">Segmentation</button>
                <button onclick="dictionnaire()">Dictionnaire</button>
                <button onclick="grep()">GREP</button>
                <button onclick="concordancier()">Concordancier</button>
                <button onclick="nombrePhrases()">Nombre de phrases</button>
            </div>
        </div>

        <div id="affichage-resultats"></div>
    </main>

    <script src="javascript/script.js"></script>
</body>
</html>
