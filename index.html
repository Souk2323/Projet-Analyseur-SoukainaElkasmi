<div id="bloc-analyseur">
    <button class="btn-aide">Afficher l'aide</button>
    
    <div class="ligne-simple">
        <label>Sélectionner un fichier .txt :</label>
        <input type="file" id="fileInput" accept=".txt">
    </div>

    <div class="tab-params">
        <div class="ligne">
            <span class="badge">DÉLIMITEUR(S)</span>
            <input type="text" id="delims" value=" ,;.'!?-">
        </div>
        
        <div class="ligne-mixte">
            <span class="badge">PÔLE</span>
            <input type="text" id="pole" placeholder="pôle..." style="width: 80px;">
            <span class="badge">LONGUEUR</span>
            <input type="number" id="longueur" value="10" style="width: 40px;">
        </div>

        <div class="ligne">
            <span class="badge">STOPWORDS</span>
            <input type="text" id="stopwords" value="de,le,la,les,à,et,des,un,une,du,que,en,l,qu,d,s,se,ne,n,ce,me,sa">
        </div>
    </div>

    <div class="cadre-bonjour">Bonjour</div>

    <div class="boutons-actions">
        <button onclick="segmenter()">Segmentation</button>
        <button onclick="dictionnaire()">Dictionnaire</button>
        <button onclick="grep()">GREP</button>
        <button onclick="concordancier()">Concordancier</button>
        <button onclick="kujuj()">/kujuj/</button>
        <br>
        <button onclick="nombrePhrases()">Nb phrases</button>
        <button onclick="motsPlusLongs()">Mots longs</button>
        <button onclick="genererGraphe()">Graphe</button>
    </div>
</div>
