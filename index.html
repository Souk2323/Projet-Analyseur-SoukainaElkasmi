<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyseur - Soukaina</title>
    <link rel="stylesheet" href="assets/css/style.css?v=2.0">
</head>
<body>

    <div id="bloc-cv">
        <div class="cv-gauche">
            <h1>Soukaina Elkasmi</h1>
            <p><strong>Livres lus :</strong></p>
            <ul class="liste-livres">
                <li>Harry Potter - J.K. Rowling</li>
                <li>La Dame de ménage - Freida McFadden</li>
                <li>Le Petit Prince - Saint-Exupéry</li>
            </ul>
        </div>
        <div class="photo-cv">
            <img src="assets/IMG_5211.jpeg" alt="Photo">
        </div>
    </div>

    <h2 class="titre-moyen">Analyse des données dans un fichier</h2>

    <div id="bloc-analyseur">
        <div class="ligne-simple">
            <label>Sélectionner un fichier .txt :</label>
            <input type="file" id="fileInput" accept=".txt">
        </div>

        <div class="ligne-mixte">
            <span class="badge">PÔLE</span>
            <input type="text" id="pole" placeholder="pôle..." style="width: 70px;">
            <span class="badge">LONGUEUR</span>
            <input type="number" id="longueur" value="10" style="width: 35px;">
        </div>

        <div class="cadre-bonjour">Bonjour</div>

        <div class="boutons-actions">
            <button onclick="segmenter()">Segmentation</button>
            <button onclick="dictionnaire()">Dictionnaire</button>
            <button onclick="grep()">GREP</button>
            <button onclick="concordancier()">Concordancier</button>
            <button onclick="kujuj()">/kujuj/</button>
        </div>
    </div>

    <footer>
        <a href="https://www.sorbonne-nouvelle.fr/" target="_blank" class="lien-sorbonne">Lien vers la Sorbonne Nouvelle</a>
    </footer>

    <script src="assets/js/main.js"></script>
</body>
</html>
