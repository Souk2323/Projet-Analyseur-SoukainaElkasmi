<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>CV & Analyseur - Soukaina Elkasmi</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <header id="cv-header">
        <img src="assets/img/maphoto.jpg" alt="Photo de Soukaina" id="cv-photo" style="width:150px; border-radius:10px; border: 2px solid #000;">
        <h1>Curriculum Vitae</h1>
        <h2>Soukaina Elkasmi</h2>
        <p>Étudiante en Sciences du Langage</p>
    </header>

    <main id="container">
        <h3>Analyseur de Texte</h3>
        <input type="file" id="fileInput">
        <br><br>
        <input type="text" id="delims" value=",;. " placeholder="Délimiteurs">
        <br><br>
        <button id="btnSegmentation">Segmenter</button>
        <button id="btnBonjour">Bonjour</button>
        <button id="btnAide">Aide</button>

        <div id="aide" style="display:none; background:white; padding:10px; border:1px solid black; margin-top:10px;">
            <p>Mode d'emploi : Chargez un fichier .txt et cliquez sur segmenter.</p>
        </div>

        <div style="display:flex; gap:10px; margin-top:20px;">
            <div id="affichageGauche" style="flex:1; height:200px; border:1px solid black; background:white; overflow:auto; padding:5px;">Texte source...</div>
            <div id="affichageDroit" style="flex:1; height:200px; border:1px solid black; background:white; overflow:auto; padding:5px;">Résultat...</div>
        </div>
        <p id="stats">Nombre de formes : 0</p>
    </main>

    <script src="assets/js/main.js"></script>
</body>
</html>
