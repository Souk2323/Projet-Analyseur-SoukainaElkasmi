<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyseur Soukaina</title>
    <link rel="stylesheet" href="assets/css/style.css?v=4">
</head>
<body>

    <div id="bloc-cv">
        <div class="cv-gauche">
            <h1>Curriculum Vitae</h1>
            <p><strong>Soukaina Elkasmi</strong></p>
            <p><em>Livres lus :</em></p>
            <ul class="liste-livres">
                <li>Harry Potter</li>
                <li>La Dame de ménage</li>
                <li>L'Anomalie</li>
                <li>Le Petit Prince</li>
                <li>L'Étranger</li>
            </ul>
        </div>
        <div class="photo-cv">
            <img src="assets/IMG_5211.jpeg" alt="Photo">
        </div>
    </div>

    <h2 class="titre-moyen">Analyse des données dans un fichier</h2>

    <div id="bloc-analyseur">
        <button class="btn-aide">Afficher l'aide</button>
        
        <div class="ligne-simple" style="margin-top:10px;">
            <label>Sélectionner un fichier .txt :</label>
            <input type="file" id="fileInput">
        </div>

        <div class="ligne-mixte">
            <span class="badge">DÉLIMITEUR(S)</span>
            <input type="text" id="delims" value=" ,;.'!?-">
        </div>

        <div class="ligne-mixte">
            <span class="badge">PÔLE</span>
            <input type="text" id="pole" placeholder="mot pôle..." style="width: 80px;">
            <span class="badge">LONGUEUR</span>
            <input type="number" id="longueur" value="10" style="width: 30px;">
        </div>

        <div class="ligne-simple">
            <span class="badge">STOPWORDS</span>
            <input type="text" id="stopwords" value="de,le,la,les,à,et,des,un,une,du,que,en,l,qu,d,s,se,ne,n,ce,me,sa" style="width: 120px;">
        </div>

        <div class="cadre-bonjour">Bonjour</div>

        <div class="boutons-actions">
            <button onclick="segmenter()">Segmentation</button>
            <button onclick="dictionnaire()">Dictionnaire</button>
            <button onclick="grep()">GREP</button>
            <button onclick="concordancier()">Concordancier</button>
            <button onclick="kujuj()">/kujuj/</button>
            <br>
            <button onclick="nombrePhrases()">Nb phrases</button>
            <button onclick="motsPlusLongs()">Mots longs</button>
            <button onclick="genererGraphe()">Graphe</button>
        </div>
    </div>

    <footer>
        <a href="https://www.sorbonne-nouvelle.fr/" target="_blank" class="lien-sorbonne">Lien vers la Sorbonne Nouvelle</a>
    </footer>

    <script src="assets/js/main.js"></script>
</body>
</html>
