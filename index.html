<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projet Analyseur - Soukaina Elkasmi</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="cv-header">
        <div class="photo-container">
            <img src="assets/IMG_5211.jpeg" alt="Photo de profil">
        </div>
        <div class="infos-etudiante">
            <h1>Soukaina Elkasmi</h1>
            <p>Étudiante en Sciences du Langage - Projet L4INA01</p>
        </div>
    </header>

    <main>
        <div class="panneau-analyse">
            <h2>Analyse des données dans un fichier</h2>
            
            <button class="btn-aide">Afficher l'aide</button>
            
            <div class="upload-zone">
                <label>Sélectionner un fichier au format .txt :</label>
                <input type="file" id="fileInput" accept=".txt">
            </div>

            <div class="parametres">
                <div class="ligne-input">
                    <span class="badge">DÉLIMITEUR(S)</span>
                    <input type="text" id="delims" value=" ,;.'!?-">
                </div>
                
                <div class="colonnes-input">
                    <div class="ligne-input">
                        <span class="badge">PÔLE</span>
                        <input type="text" id="pole" placeholder="ex: conduite">
                    </div>
                    <div class="ligne-input">
                        <span class="badge">LONGUEUR</span>
                        <input type="number" id="longueur" value="10">
                    </div>
                </div>

                <div class="ligne-input full">
                    <span class="badge">MOTS GRAMMATICAUX (STOPWORDS)</span>
                    <input type="text" id="stopwords" value="de,le,la,les,à,et,des,un,une,du,que,en,l,qu,d,s,se,ne,n,ce,me,sa">
                </div>
            </div>

            <div class="boutons-actions">
                <button onclick="segmenter()">Segmentation</button>
                <button onclick="genererDictionnaire()">Dictionnaire</button>
                <button onclick="concordancier()">Concordancier</button>
                <button onclick="motsPlusLongs()">Mots les plus longs</button>
                <button onclick="compterPhrases()">Nombre de phrases</button>
            </div>
        </div>

        <div id="resultats" class="zone-affichage"></div>
    </main>

    <script src="javascript/script.js"></script>
</body>
</html>
