<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Analyse des données dans un fichier</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>Analyse des données dans un fichier</h1>

    <div class="main-container">
        <input type="file" id="fileInput" accept=".txt">
        
        <div class="settings">
            <label>Délimiteur(s) :</label>
            <input type="text" id="delimiters" value=" ,;.'!?-">
            
            <label>Pôle :</label>
            <input type="text" id="poleInput" placeholder="entrez un pôle...">
            
            <label>Longueur :</label>
            <input type="number" id="contextLength" value="10">
        </div>

        <div class="buttons">
            <button onclick="segmenter()">Segmentation</button>
            <button onclick="genererDico()">Dictionnaire</button>
            <button onclick="concordancier()">Concordancier</button>
            <button onclick="compterPhrases()">Nombre de phrases</button>
        </div>

        <div id="resultats"></div>
    </div>

    <script src="javascript/script.js"></script>
</body>
</html>
