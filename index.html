<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Interface Jaune</title>
    <style>
        /* On remet ton style d'origine ici */
        body {
            background-color: #1a1a1a; /* Fond sombre pour faire ressortir le jaune */
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #ffcc00; /* Le jaune parfait du début */
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            text-align: center;
        }

        .btn {
            background-color: #000;
            color: #ffcc00;
            border: none;
            padding: 15px 30px;
            margin: 10px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
            background-color: #333;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 style="color: #000;">Tableau de Bord</h1>
        
        <button class="btn" onclick="actionBouton('Alerte')">Bouton 1</button>
        <button class="btn" onclick="actionBouton('Validation')">Bouton 2</button>
    </div>

    <script>
        // La fonction qui manquait pour faire marcher les boutons
        function actionBouton(nom) {
            alert("Tu as cliqué sur : " + nom);
            console.log("Action exécutée pour " + nom);
        }
    </script>

</body>
</html>
