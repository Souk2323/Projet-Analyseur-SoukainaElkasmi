<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Projet L4INA01 - Soukaina Elkasmi</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <img src="assets/img/maphoto.jpg" id="cv-photo" alt="Photo de Soukaina">
        <h1>Soukaina Elkasmi</h1>
        <p>Étudiante en Sciences du Langage</p>
    </header>

    <div id="container">
        <h2>Analyseur de Texte</h2>
        <p>Sélectionner un fichier au format .txt : <input type="file" id="fileInput"></p>
        
        <div class="inputs">
            <label>DÉLIMITEURS :</label>
            <input type="text" id="delims" value="[ ,.?;:!/()&quot;']+">
            <label>PÔLE :</label>
            <input type="text" id="pole" placeholder="entrez un pôle...">
        </div>

        <div class="buttons">
            <button id="btnBonjour">Bonjour</button>
            <button id="btnSegmentation">Segmentation</button>
            <button id="btnAide">Aide</button>
        </div>

        <div class="affichage-flex">
            <textarea id="affichageGauche" readonly></textarea>
            <div id="affichageDroit"></div>
        </div>
        <p id="stats"></p>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
