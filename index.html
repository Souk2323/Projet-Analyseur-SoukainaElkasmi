<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse des données dans un fichier - Soukaina Elkasmi</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="photo-cv">
        <img src="assets/IMG_5211.jpeg" alt="Photo de Soukaina Elkasmi">
    </div>

    <header>
        <h1>Analyse des données dans un fichier</h1>
    </header>

    <main>
        <div class="panneau-central">
            <button class="btn-aide">Afficher l'aide</button>
            
            <div class="upload-zone">
                <label>Sélectionner un fichier au format .txt :</label>
                <input type="file" id="fileInput" accept=".txt">
            </div>

            <div class="parametres">
                <div class="ligne-input">
                    <span class="badge">DÉLIMITEUR(S)</span>
                    <input type="text" id="delims" value=" ,;.'!?-">
                </div>
                
                <div class="colonnes-input">
                    <div class="ligne-input">
                        <span class="badge">PÔLE</span>
                        <input type="text" id="pole" placeholder="entrez un pôle...">
                    </div>
                    <div class="ligne-input">
                        <span class="badge">LONGUEUR</span>
                        <input type="number" id="longueur" value="10">
                    </div>
                </div>

                <div class="ligne-input full">
                    <span class="badge">MOTS GRAMMATICAUX (STOPWORDS)</span>
                    <input type="text" id="stopwords" value="de,le,la,les,à,et,des,un,une,du,que,en,l,qu,d,s,se,ne,n,ce,me,sa">
                </div>
            </div>

            <div class="logo-bonjour">
                <div class="cadre-bonjour">Bonjour</div>
            </div>

            <div class="boutons-actions">
                <button onclick="segmenter()">Segmentation</button>
                <button onclick="dictionnaire()">Dictionnaire</button>
                <button onclick="concordancier()">Concordancier</button>
                <button onclick="motsPlusLongs()">Mots les plus longs</button>
                <button onclick="nombrePhrases()">Nombre de phrases</button>
            </div>
        </div>

        <div id="resultats" class="zone-resultats"></div>
    </main>

    <script src="javascript/script.js"></script>
</body>
</html>
