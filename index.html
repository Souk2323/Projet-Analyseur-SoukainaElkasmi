<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Projet Soukaina Elkasmi</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <div id="cv-section">
        <div class="header-cv">
            <h1>Curriculum Vitae</h1>
            <h2>Soukaina Elkasmi</h2>
            <p>Étudiante en Sciences du Langage</p>
        </div>

        <div class="cv-content">
            <div class="cv-details">
                <p><strong>Mon parcours :</strong></p>
                <ul>
                    <li>2024-2025 : L1 Sciences du langage</li>
                    <li>2025-2026 : L2 Sciences du langage</li>
                </ul>
            </div>
            <div class="cv-photo-zone">
                <img src="assets/img/maphoto.jpg" alt="Photo de Soukaina" id="cv-photo">
            </div>
        </div>
    </div>

    <div id="analyseur-container">
        <h3>Analyse des données dans un fichier</h3>
        
        <div class="file-zone">
            <input type="file" id="fileInput">
        </div>

        <div class="params">
            DÉLIMITEURS: <input type="text" id="delims" value="[ ,.?;:!/()&quot;']+">
            PÔLE: <input type="text" id="pole" placeholder="mot...">
        </div>

        <div class="buttons">
            <button id="btnBonjour">Bonjour</button>
            <button id="btnSegmentation">Segmenter</button>
            <button id="btnAide">Aide</button>
        </div>

        <div class="display-flex">
            <textarea id="affichageGauche" placeholder="Texte source..."></textarea>
            <div id="affichageDroit">Résultat...</div>
        </div>
        
        <p id="stats">Nombre de formes : 0</p>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
